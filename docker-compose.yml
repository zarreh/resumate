services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resumate-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://resumate:resumate@postgres:5432/resumate
      SECRET_KEY: dev-secret-key-change-me-in-production-at-least-32-chars
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: resumate-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: resumate
      POSTGRES_PASSWORD: resumate
      POSTGRES_DB: resumate
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resumate -d resumate"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # frontend:
